<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Backtrader Web</title>
    <link rel="stylesheet" href="/static/styles.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css"
    />
  </head>
  <body>
    <div id="app">
      <aside id="sidebar">
        <div class="sidebar-title">策略列表（右键可查看源码）</div>
        <div id="strategy-list" class="strategy-list"></div>
      </aside>

      <main id="main">
        <section id="controls">
          <div class="control-row">
            <label class="control">
              <span>股票代码</span>
              <input id="symbol" type="text" value="AAPL" placeholder="AAPL" />
            </label>

            <label class="control">
              <span>资金金额</span>
              <input id="cash" type="number" step="100" value="100000" />
            </label>

            <label class="control">
              <span>开始时间</span>
              <input id="startDate" type="date" />
            </label>

            <label class="control">
              <span>结束时间</span>
              <input id="endDate" type="date" />
            </label>

            <button id="runBtn" class="primary">开始回测</button>
          </div>

          <div class="meta-row">
            <div id="status" class="status">准备就绪</div>
            <div id="metrics" class="metrics"></div>
            <button id="exportBtn" class="secondary" disabled>导出交易CSV</button>
          </div>
        </section>

        <section id="chart-section">
          <div id="kline-container"></div>
          <div id="equity-container">
            <div class="chart-title">资金曲线</div>
            <canvas id="chart"></canvas>
          </div>
        </section>
      </main>
    </div>

    <div id="strategy-context-menu" class="context-menu hidden">
      <button id="contextRunBacktest" type="button">开始回测</button>
      <button id="contextViewSource" type="button">查看源代码</button>
    </div>

    <div id="source-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="source-modal-title">
      <div id="source-modal-mask" class="modal-mask"></div>
      <div class="modal-content">
        <div class="modal-header">
          <div id="source-modal-title">策略源码</div>
          <button id="source-modal-close" class="icon-btn" type="button">关闭</button>
        </div>
        <pre class="code-block"><code id="source-code" class="language-python"></code></pre>
      </div>
    </div>

    <script src="https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/python.min.js"></script>
    <script src="/static/app.js"></script>
  </body>
</html>
